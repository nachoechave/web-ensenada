<section class="areas-section">
  <div class="areas-container">
    <div class="section-header">
      <span class="section-kicker">Gestión municipal</span>
      <h2>Áreas municipales</h2>
      <p>
        Conocé las principales áreas de trabajo del Municipio y los servicios que
        brindan a la comunidad.
      </p>
    </div>

    <div class="areas-grid">
      @for (area of areas; track area.numero) {
        <article class="area-card">
          <span class="area-number">{{ area.numero }}</span>
          <h3>{{ area.nombre }}</h3>
          <p>{{ area.descripcion }}</p>
        </article>
      }
    </div>
  </div>
</section>
