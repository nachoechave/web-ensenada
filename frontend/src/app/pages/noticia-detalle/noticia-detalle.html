@if (noticia) {
  <section class="noticia-detalle-page">
    <div class="detalle-container">
      <a routerLink="/noticias" class="breadcrumb">
        ← Volver a noticias
      </a>

      <article class="detalle-card">
        <div class="detalle-imagen">
          <img [src]="noticia.imagen" [alt]="noticia.titulo" />
        </div>

        <div class="detalle-contenido">
          <div class="detalle-meta">
            <span class="categoria">{{ noticia.categoria }}</span>
            <span class="fecha">{{ noticia.fecha }}</span>
          </div>

          <h1>{{ noticia.titulo }}</h1>

          <p class="bajada">
            {{ noticia.bajada }}
          </p>

          <div class="cuerpo">
            <p>{{ noticia.contenido }}</p>
          </div>

          <div class="detalle-actions">
            <a routerLink="/noticias" class="volver-button">
              Volver a noticias
            </a>
          </div>
        </div>
      </article>
    </div>
  </section>
} @else {
  <section class="noticia-detalle-page">
    <div class="detalle-container">
      <div class="detalle-card detalle-empty">
        <h1>Noticia no encontrada</h1>
        <p>La noticia solicitada no existe o ya no se encuentra disponible.</p>

        <a routerLink="/noticias" class="volver-button">
          Volver a noticias
        </a>
      </div>
    </div>
  </section>
}
